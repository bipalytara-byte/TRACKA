<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TRACKA — Laporan Progress TA/Skripsi</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js">
// ============================================================
// EXPORT PDF — LAPORAN DOSEN
// ============================================================
function exportPDF() {
  const filled = mahasiswaList.filter(m => progressData[String(m.nim)]);
  if (filled.length === 0) {
    showToast('Belum ada data yang tersimpan!', 'error');
    return;
  }

  showToast('⏳ Membuat PDF...', '');

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

  const now = new Date();
  const tglCetak = now.toLocaleDateString('id-ID', { day:'numeric', month:'long', year:'numeric' });
  const namaShort = dosenNama.split(',')[0];

  // ── HEADER ──
  doc.setFillColor(26, 26, 46);
  doc.rect(0, 0, 210, 38, 'F');
  doc.setTextColor(255, 255, 255);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(15);
  doc.text('TRACKA — Laporan Progress Bimbingan TA/Skripsi', 14, 13);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(9);
  doc.text('Pekan TRACKA 22–27 Juni 2026  |  BIPA Magelang', 14, 21);
  doc.text('Dicetak: ' + tglCetak, 14, 28);

  // Accent bar
  doc.setFillColor(233, 69, 96);
  doc.rect(0, 38, 210, 2, 'F');

  // ── INFO DOSEN ──
  doc.setTextColor(26, 26, 46);
  doc.setFontSize(11);
  doc.setFont('helvetica', 'bold');
  doc.text('Dosen Pembimbing', 14, 48);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(10);
  doc.text(dosenNama, 14, 55);

  // ── SUMMARY CARDS ──
  const cardData = [
    { label: 'Total Mahasiswa', val: mahasiswaList.length },
    { label: 'Sudah Dilaporkan', val: filled.length },
    { label: 'Siap Maju Juli', val: Object.values(progressData).filter(p => p.kesanggupan === 'Siap Juli').length },
    { label: 'Total Sesi', val: Object.keys(progressData).length },
  ];
  const cardW = 43, cardH = 18, cardY = 60;
  cardData.forEach((c, i) => {
    const x = 14 + i * (cardW + 2);
    doc.setFillColor(240, 242, 245);
    doc.roundedRect(x, cardY, cardW, cardH, 2, 2, 'F');
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(16);
    doc.setTextColor(26, 26, 46);
    doc.text(String(c.val), x + cardW/2, cardY + 10, { align: 'center' });
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(7.5);
    doc.setTextColor(107, 114, 128);
    doc.text(c.label, x + cardW/2, cardY + 15, { align: 'center' });
  });

  // ── TABEL PROGRESS TERBARU PER MAHASISWA ──
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(11);
  doc.setTextColor(26, 26, 46);
  doc.text('Status Progress Mahasiswa', 14, 88);

  // Pisah PB1 dan PB2
  const pb1 = mahasiswaList.filter(m => m.posisi === 'Pembimbing 1');
  const pb2 = mahasiswaList.filter(m => m.posisi === 'Pembimbing 2');
  const allSorted = [...pb1, ...pb2];

  const tableRows = allSorted.map((m, i) => {
    const nim = String(m.nim);
    const p = progressData[nim];
    return [
      i + 1,
      m.nama,
      m.nim,
      m.posisi === 'Pembimbing 1' ? 'PB1' : 'PB2',
      p ? (p.tglBimbingan || p.periode || '—') : '—',
      p ? 'Ke-' + (p.bimbinganKe || '?') : '—',
      p ? (p.topikBimbingan || '—') : '—',
      p ? (p.statusProgress || '—') : 'Belum diisi',
      p ? (p.kesanggupan || '—') : '—',
      p ? (p.catatanDosen || '—') : '—',
    ];
  });

  doc.autoTable({
    startY: 91,
    head: [['No','Nama','NIM','Pos','Tgl','Sesi','Topik','Status Progress','Kesanggupan','Catatan']],
    body: tableRows,
    styles: { fontSize: 7.5, cellPadding: 2.5, overflow: 'linebreak' },
    headStyles: { fillColor: [26, 26, 46], textColor: 255, fontStyle: 'bold', fontSize: 7.5 },
    columnStyles: {
      0: { cellWidth: 7 },
      1: { cellWidth: 38 },
      2: { cellWidth: 16 },
      3: { cellWidth: 9 },
      4: { cellWidth: 17 },
      5: { cellWidth: 10 },
      6: { cellWidth: 28 },
      7: { cellWidth: 30 },
      8: { cellWidth: 22 },
      9: { cellWidth: 18 },
    },
    alternateRowStyles: { fillColor: [248, 249, 250] },
    didParseCell: function(data) {
      if (data.section === 'body') {
        if (data.column.index === 8) {
          const val = data.cell.raw;
          if (val === 'Siap Juli') data.cell.styles.textColor = [45, 106, 79];
          else if (val === 'Siap Agustus') data.cell.styles.textColor = [146, 64, 14];
          else if (val === 'Belum diisi') data.cell.styles.textColor = [233, 69, 96];
        }
        if (data.column.index === 7 && data.cell.raw === 'Belum diisi') {
          data.cell.styles.textColor = [233, 69, 96];
        }
      }
    }
  });

  // ── TANDA TANGAN ──
  const finalY = doc.lastAutoTable.finalY + 14;
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(10);
  doc.setTextColor(26, 26, 46);
  doc.text('Magelang, ' + tglCetak, 140, finalY);
  doc.text('Dosen Pembimbing,', 140, finalY + 7);
  doc.line(140, finalY + 28, 196, finalY + 28);
  doc.setFont('helvetica', 'bold');
  doc.text(namaShort, 140, finalY + 33);

  // ── FOOTER ──
  const pageCount = doc.internal.getNumberOfPages();
  for (let i = 1; i <= pageCount; i++) {
    doc.setPage(i);
    doc.setFontSize(7.5);
    doc.setTextColor(180);
    doc.text('TRACKA — Sistem Tracking Aktivitas Akademik TA/Skripsi | BIPA', 14, 290);
    doc.text('Hal ' + i + '/' + pageCount, 196, 290, { align: 'right' });
  }

  const filename = 'TRACKA_Laporan_' + namaShort.replace(/\s+/g,'_') + '_' +
    now.toISOString().split('T')[0] + '.pdf';
  doc.save(filename);
  showToast('✅ PDF berhasil diunduh!', 'success');
}

</script>

  <style>
    :root {
      --navy:     #1a1a2e;
      --navy-mid: #16213e;
      --blue:     #0f3460;
      --accent:   #e94560;
      --green:    #2d6a4f;
      --green-lt: #52b788;
      --amber:    #f4a261;
      --bg:       #f0f2f5;
      --card:     #ffffff;
      --text:     #1a1a2e;
      --muted:    #6b7280;
      --border:   #e5e7eb;
      --radius:   12px;
      --shadow:   0 2px 12px rgba(0,0,0,0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: var(--navy);
      padding: 20px 24px 18px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 16px rgba(0,0,0,0.3);
    }
    .header-inner {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .header-logo {
      width: 40px; height: 40px;
      background: var(--accent);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 800;
      color: white;
      font-size: 14px;
      letter-spacing: -0.5px;
      flex-shrink: 0;
    }
    .header-text h1 {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: white;
      line-height: 1.2;
    }
    .header-text p {
      font-size: 11px;
      color: rgba(255,255,255,0.55);
      margin-top: 2px;
    }
    .periode-badge {
      margin-left: auto;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.8);
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 20px;
      white-space: nowrap;
    }

    /* ── MAIN ── */
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 24px 16px 80px;
    }

    /* ── DOSEN CARD ── */
    .dosen-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 18px 20px;
      margin-bottom: 20px;
      box-shadow: var(--shadow);
      border-left: 4px solid var(--accent);
    }
    .dosen-card .label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .dosen-card .nama {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 17px;
      font-weight: 700;
      color: var(--navy);
    }
    .dosen-stats {
      display: flex;
      gap: 16px;
      margin-top: 12px;
    }
    .stat-item {
      text-align: center;
      background: var(--bg);
      border-radius: 8px;
      padding: 8px 14px;
      flex: 1;
    }
    .stat-item .num {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 20px;
      font-weight: 800;
      color: var(--navy);
    }
    .stat-item .num.green { color: var(--green); }
    .stat-item .num.amber { color: var(--amber); }
    .stat-item .lbl {
      font-size: 10px;
      color: var(--muted);
      margin-top: 1px;
    }

    /* ── PROGRESS BAR ── */
    .progress-bar-wrap {
      margin-top: 12px;
    }
    .progress-bar-track {
      height: 6px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--green-lt), var(--green));
      border-radius: 99px;
      transition: width 0.6s ease;
    }
    .progress-bar-label {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ── SECTION HEADER ── */
    .section-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 24px 0 12px;
    }
    .section-header h2 {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--navy);
    }
    .badge-count {
      background: var(--navy);
      color: white;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 99px;
    }
    .posisi-tag {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 4px;
      margin-left: auto;
    }
    .posisi-tag.p1 { background: #dbeafe; color: #1e40af; }
    .posisi-tag.p2 { background: #fce7f3; color: #9d174d; }

    /* ── MAHASISWA CARD ── */
    .mhs-card {
      background: var(--card);
      border-radius: var(--radius);
      margin-bottom: 12px;
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 1px solid var(--border);
      transition: box-shadow 0.2s;
    }
    .mhs-card.filled {
      border-color: var(--green-lt);
    }
    .mhs-card.filled .mhs-header {
      border-left: 4px solid var(--green-lt);
    }
    .mhs-header {
      padding: 14px 16px;
      cursor: pointer;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      border-left: 4px solid transparent;
      transition: background 0.15s;
    }
    .mhs-header:hover { background: #fafafa; }
    .mhs-avatar {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: var(--navy);
      color: white;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700;
      font-size: 14px;
      flex-shrink: 0;
    }
    .mhs-info { flex: 1; min-width: 0; }
    .mhs-nama {
      font-weight: 600;
      font-size: 14px;
      color: var(--navy);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .mhs-meta {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .mhs-nim { font-weight: 500; }
    .dot { color: var(--border); }

    .status-pill {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 99px;
      white-space: nowrap;
    }
    .status-pill.empty { background: #fef3c7; color: #92400e; }
    .status-pill.saved { background: #d1fae5; color: #065f46; }

    .chevron {
      font-size: 12px;
      color: var(--muted);
      transition: transform 0.2s;
      flex-shrink: 0;
      margin-top: 4px;
    }
    .mhs-card.open .chevron { transform: rotate(180deg); }

    /* ── FORM PANEL ── */
    .form-panel {
      display: none;
      padding: 0 16px 16px;
      border-top: 1px solid var(--border);
      background: #fafbfc;
    }
    .mhs-card.open .form-panel { display: block; }

    .judul-box {
      margin-top: 14px;
      padding: 10px 12px;
      background: #fffbeb;
      border: 1px dashed #f59e0b;
      border-radius: 8px;
      margin-bottom: 4px;
    }
    .judul-box .judul-label {
      font-size: 11px;
      font-weight: 600;
      color: #92400e;
      margin-bottom: 4px;
    }
    .judul-box .judul-text {
      font-size: 13px;
      color: var(--text);
      line-height: 1.5;
    }
    .judul-box.empty-judul {
      background: #fff7ed;
      border-color: var(--accent);
    }

    .field-group {
      margin-top: 14px;
    }
    .field-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--navy);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .field-label .req { color: var(--accent); }

    select, textarea, input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      color: var(--text);
      background: white;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    select:focus, textarea:focus, input[type="text"]:focus {
      border-color: var(--blue);
    }
    textarea { resize: vertical; min-height: 70px; }

    .lainnya-field {
      margin-top: 8px;
      display: none;
    }
    .lainnya-field.show { display: block; }

    /* ── STATUS CHIPS ── */
    .chips-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .chip {
      padding: 6px 12px;
      border-radius: 99px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: 1.5px solid var(--border);
      background: white;
      color: var(--text);

      📄 Export PDF
    </button>
  </div>

<main id="mainContent">
  <div class="loading-wrap" id="loadingState">

  </div>
</main>

  <button class="btn-save-all" onclick="saveAll()">
    💾 Simpan Semua Progress
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// CONFIG
// ============================================================
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyqHVuNaL1Cr3tIL8gZTvguAsWgppcxc0ZqdhRjctS1mah_gP6xhupUyVYKSkKu3jqe7Q/exec';

const STATUS_PROGRESS = [
  'Uji Validasi Judul',
  'ACC Validasi Judul',
  'Mengerjakkan Bab 1 - 3',
  'Proses Ganti Judul',
  'Proses Mencari Judul',
  'Mengerjakkan Instrumen Penelitian',
  'Validasi Akhir/Praktisi',
  'Mengerjakkan Bab 4 - 5',
  'Mengerjakkan Jurnal',
  'ACC Pendadaran',
  'Sudah Pendadaran',
  'Lainnya'
];

const KENDALA_OPTIONS = [
  'Tidak Ada Kendala',
  'Kesulitan Teknis Penulisan',
  'Data/Objek Penelitian Belum Lengkap',
  'Sulit Ditemui / Jadwal Bentrok',
  'Masalah Pribadi/Kesehatan',
  'Revisi Berulang dari Pembimbing',
  'Belum Mulai Mengerjakan',
  'Lainnya'
];

const KESANGGUPAN = [
  { label: '✅ Siap Juli', value: 'Siap Juli', cls: 'chip-siap-juli' },
  { label: '❓ Belum Bisa Diprediksi', value: 'Belum Bisa Diprediksi', cls: 'chip-belum' }
];

// ============================================================
// STATE
// ============================================================
let dosenNama = '';
let dosenToken = '';
let mahasiswaList = [];
let progressData = {};  // nim -> progress TERBARU per mahasiswa
let historyData = {};   // nim -> array semua sesi
let formData = {};      // nim -> data form saat ini
let periode = '';

// Helper: tanggal hari ini dalam format yyyy-mm-dd, berdasarkan zona waktu LOKAL
// (toISOString() mengonversi ke UTC, yang bisa salah tanggal antara jam 00:00-06:59 WIB)
function getTodayLocal() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

// Helper: parse timestamp format 'dd/MM/yyyy HH:mm:ss' (dari GAS Utilities.formatDate)
// menjadi objek Date yang valid untuk PERBANDINGAN, bukan perbandingan string langsung
// (string compare bisa salah lintas bulan/tahun, misal "05/01/2027" vs "25/12/2026").
function parseTimestamp(str) {
  if (!str) return null;
  const parts = String(str).trim().split(' ');
  const datePart = parts[0];
  const timePart = parts[1] || '00:00:00';
  const [day, month, year] = datePart.split('/').map(Number);
  const [hh, mm, ss] = timePart.split(':').map(Number);
  if (!day || !month || !year) return null;
  return new Date(year, month - 1, day, hh || 0, mm || 0, ss || 0);
}

// ============================================================
// INIT
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  dosenToken = params.get('token') || '';
  
  // Set periode hari ini
  const now = new Date();
  periode = getTodayLocal(); // yyyy-mm-dd
  const periodeLabel = now.toLocaleDateString('id-ID', { 
    weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' 
  });
  document.getElementById('periodeBadge').textContent = periodeLabel;

  if (!dosenToken) {
    showError('Token tidak ditemukan', 'Pastikan kamu menggunakan link yang benar dari koordinator.');
    return;
  }

  loadData();
});

// ============================================================
// LOAD DATA
// ============================================================
async function loadData() {
  try {
    // Paralel: ambil mahasiswa + progress existing
    const [mhsRes, progRes] = await Promise.all([
      callGAS({ action: 'getMahasiswa', token: dosenToken }),
      callGAS({ action: 'getProgress', token: dosenToken, periode: null })
    ]);

    if (mhsRes.status !== 'ok') throw new Error(mhsRes.message);
    
    dosenNama = mhsRes.dosen;
    mahasiswaList = mhsRes.mahasiswa || [];

    // Ambil progress TERBARU per mahasiswa (dari semua periode)
    // progressData[nim] = entri paling baru
    if (progRes.status === 'ok' && progRes.data) {
      progRes.data.forEach(p => {
        const nim = String(p.nim);
        const pTime = parseTimestamp(p.timestamp);
        const existingTime = progressData[nim] ? parseTimestamp(progressData[nim].timestamp) : null;
        if (!progressData[nim] || (pTime && existingTime && pTime > existingTime) || (pTime && !existingTime)) {
          progressData[nim] = p;
        }
      });
    }
    
    // historyData[nim] = array semua sesi (untuk counter)
    historyData = {};
    if (progRes.status === 'ok' && progRes.data) {
      progRes.data.forEach(p => {
        const nim = String(p.nim);
        if (!historyData[nim]) historyData[nim] = [];
        historyData[nim].push(p);
      });
    }

    renderUI();
  } catch(err) {
    showError('Gagal memuat data', err.message || 'Periksa koneksi internet kamu.');
  }
}

// ============================================================
// RENDER UI
// ============================================================
function renderUI() {
  const main = document.getElementById('mainContent');
  
  const totalMhs = mahasiswaList.length;
  // Sudah diisi = pernah ada sesi bimbingan minimal 1x
  const sudahDiisi = mahasiswaList.filter(m => historyData[String(m.nim)] && historyData[String(m.nim)].length > 0).length;
  const totalSesi = Object.values(historyData).reduce((s, arr) => s + arr.length, 0);
  const pct = totalMhs > 0 ? Math.round((sudahDiisi / totalMhs) * 100) : 0;

  // Pisah dosbing 1 dan 2
  const pb1List = mahasiswaList.filter(m => m.posisi === 'Pembimbing 1');
  const pb2List = mahasiswaList.filter(m => m.posisi === 'Pembimbing 2');

  let html = `
    <div class="dosen-card">
      <div class="label">Dosen Pembimbing</div>
      <div class="nama">${dosenNama}</div>
      <div class="dosen-stats">
        <div class="stat-item">
          <div class="num">${totalMhs}</div>
          <div class="lbl">Total Mahasiswa</div>
        </div>
        <div class="stat-item">
          <div class="num green">${sudahDiisi}</div>
          <div class="lbl">Terlaporkan</div>
        </div>
        <div class="stat-item">
          <div class="num amber">${totalMhs - sudahDiisi}</div>
          <div class="lbl">Belum Ada Sesi</div>
        </div>
        <div class="stat-item">
          <div class="num" style="color:var(--purple)">${totalSesi}</div>
          <div class="lbl">Total Sesi</div>
        </div>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="progressFill" style="width:${pct}%"></div>
        </div>
        <div class="progress-bar-label">
          <span>Progress pengisian</span>
          <span id="pctLabel">${pct}%</span>
        </div>
      </div>
    </div>
  `;

  if (pb1List.length > 0) {
    html += `
      <div class="section-header">
        <h2>Pembimbing 1</h2>
        <span class="badge-count">${pb1List.length}</span>
      </div>
    `;
    pb1List.forEach(m => { html += renderMhsCard(m, 'p1'); });
  }

  if (pb2List.length > 0) {
    html += `
      <div class="section-header">
        <h2>Pembimbing 2</h2>
        <span class="badge-count">${pb2List.length}</span>
      </div>
    `;
    pb2List.forEach(m => { html += renderMhsCard(m, 'p2'); });
  }

  // Tombol tambah mahasiswa baru
  html += `
    <div class="section-header" style="margin-top:28px">
      <h2>Mahasiswa Belum Terdaftar?</h2>
    </div>
    <button class="btn-tambah-mhs" onclick="openModal()">
      ➕ Tambah Mahasiswa Baru
    </button>
    <p style="font-size:11px;color:var(--muted);margin-top:8px;text-align:center">
      Gunakan fitur ini hanya untuk mahasiswa yang belum ada di daftar
    </p>
  `;

  main.innerHTML = html;

  // Init form state — SETIAP sesi baru harus mulai dari kosong (kecuali tglBimbingan
  // yang default ke hari ini). Nilai dari `existing` (sesi sebelumnya) HANYA dipakai
  // untuk ditampilkan di kotak "Sesi Terakhir" (read-only), tidak pernah untuk
  // mengisi field input sesi baru — supaya dosen tidak salah kira field sudah terisi.
  mahasiswaList.forEach(m => {
    const existing = progressData[String(m.nim)];
    formData[String(m.nim)] = {
      tglBimbingan: getTodayLocal(),
      bimbinganKe: '',
      topikBimbingan: '',
      statusProgress: '', progressDetail: '',
      kendalaUtama: '', kendalaDetail: '',
      kesanggupan: '', catatanDosen: '', judulBaru: ''
    };
    if (existing) {
      // Pre-fill form elements (saat ini hanya tglBimbingan yang di-set di dalamnya)
      prefillForm(m.nim, existing);
    }
  });

  document.getElementById('saveAllBar').classList.add('visible');
  // Tampilkan tombol export PDF di header
  document.getElementById('btnExportPDF').style.display = 'block';
}

function renderMhsCard(m, posisiCls) {
  const nim = String(m.nim);
  const existing = progressData[nim];
  const isFilled = !!existing;
  const initials = m.nama.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
  const judulEmpty = !m.judul || m.judul.trim() === '';

  const statusPill = isFilled
    ? `<span class="status-pill saved">✓ Tersimpan</span>`
    : `<span class="status-pill empty">Belum diisi</span>`;

  const judulHtml = judulEmpty
    ? `<div class="judul-box empty-judul" id="judulBox_${nim}">
        <div class="judul-label">⚠️ Judul belum ada — isi di bawah</div>
       </div>`
    : `<div class="judul-box" id="judulBox_${nim}">
        <div class="judul-label">Judul TA/Skripsi</div>
        <div class="judul-text" id="judulText_${nim}">${m.judul}</div>
        <div style="margin-top:8px;display:flex;gap:8px">
          <button type="button" class="btn-edit-judul" onclick="toggleEditJudul('${nim}')"
            style="font-size:11px;padding:5px 10px;border:1px solid var(--border);border-radius:6px;background:#fff;cursor:pointer">✏️ Edit Judul</button>
          <button type="button" class="btn-riwayat-judul" onclick="lihatRiwayatJudul('${nim}')"
            style="font-size:11px;padding:5px 10px;border:1px solid var(--border);border-radius:6px;background:#fff;cursor:pointer">📜 Riwayat</button>
        </div>
        <div id="editJudulBox_${nim}" style="display:none;margin-top:10px">
          <textarea id="judulEditInput_${nim}" rows="2"
            placeholder="Tulis judul baru (judul sebelumnya akan tercatat di riwayat)..."
            style="width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-family:Inter,sans-serif;font-size:13px;outline:none"
            oninput="updateField('${nim}', 'judulBaru', this.value)">${m.judul}</textarea>
          <div style="margin-top:6px;font-size:11px;color:var(--muted)">
            ℹ️ Perubahan tersimpan saat Anda klik "Simpan" di bawah. Tidak otomatis dilaporkan ke BAAK.
          </div>
        </div>
        <div id="riwayatJudulBox_${nim}" style="display:none;margin-top:10px;font-size:12px"></div>
       </div>`;

  // Build status progress options — SENGAJA tidak auto-select dari sesi sebelumnya.
  // Dosen harus memilih ulang dari kosong ("— Pilih status —") untuk setiap sesi baru.
  const statusOpts = STATUS_PROGRESS.map(s =>
    `<option value="${s}">${s}</option>`
  ).join('');

  // Build kendala options — sama, tidak auto-select dari sesi sebelumnya.
  const kendalaOpts = KENDALA_OPTIONS.map(k =>
    `<option value="${k}">${k}</option>`
  ).join('');

  // Build kesanggupan chips — SENGAJA tidak auto-select dari sesi sebelumnya.
  const kesanggupanChips = KESANGGUPAN.map(k =>
    `<div class="chip ${k.cls}"
      onclick="selectChip(this, '${nim}', 'kesanggupan', '${k.value}')">${k.label}</div>`
  ).join('');

  // Tanggal hari ini format yyyy-mm-dd (zona waktu lokal, bukan UTC)
  const today = getTodayLocal();
  // PENTING: isi formData juga, bukan cuma value HTML — kalau dosen tidak pernah
  // menyentuh field tanggal, formData[nim].tglBimbingan harus tetap terisi default
  // hari ini, supaya validasi saveSingle() tidak salah mendeteksi "belum diisi".
  if (!formData[nim]) formData[nim] = {};
  if (!formData[nim].tglBimbingan) formData[nim].tglBimbingan = today;
  // SENGAJA selalu false — textarea "Lainnya" untuk sesi baru harus tertutup di awal,
  // tidak ikut terbuka karena status sesi SEBELUMNYA kebetulan "Lainnya".
  const showLainnya = '';
  const showKendalaLainnya = '';
  // Hitung total sesi mahasiswa ini
  const sesiCount = historyData[nim] ? historyData[nim].length : 0;

  return `
    <div class="mhs-card ${isFilled ? 'filled' : ''}" id="card_${nim}">
      <div class="mhs-header" onclick="toggleCard('${nim}')">
        <div class="mhs-avatar">${initials}</div>
        <div class="mhs-info">
          <div class="mhs-nama">${m.nama}</div>
          <div class="mhs-meta">
            <span class="mhs-nim">${m.nim}</span>
            <span class="dot">·</span>
            <span>${m.prodi}</span>
          </div>
          <div class="mhs-meta" style="margin-top:4px">
            ${statusPill}
            ${existing ? `<span class="status-pill saved" style="background:#dbeafe;color:#1e40af">${existing.statusProgress}</span>` : ''}
            ${sesiCount > 0 ? `<span class="sesi-count-badge">🔄 ${sesiCount}x sesi</span>` : ''}
          </div>
        </div>
        <span class="chevron">▼</span>
      </div>

      <div class="form-panel" id="panel_${nim}">
        ${judulHtml}

        ${sesiCount > 0 && existing ? `
        <div class="riwayat-box">
          <div class="riwayat-label">📋 Sesi Terakhir (${existing.tglBimbingan || existing.periode || '—'}  •  Bimbingan ke-${existing.bimbinganKe || '?'})</div>
          <div class="riwayat-grid">
            <div class="riwayat-item">
              <div class="r-key">Status Progress</div>
              <div class="r-val">${existing.statusProgress || '—'}</div>
            </div>

// ============================================================
// RIWAYAT JUDUL — tampilkan histori perubahan judul mahasiswa
// ============================================================
async function lihatRiwayatJudul(nim) {
  const box = document.getElementById('riwayatJudulBox_' + nim);
  if (!box) return;

  const showing = box.style.display !== 'none';
  if (showing) {
    box.style.display = 'none';
    return;
  }

  box.style.display = 'block';
  box.innerHTML = '<span style="color:var(--muted)">⏳ Memuat riwayat...</span>';

  try {
    const res = await callGAS({ action: 'getRiwayatJudul', nim: nim });
    if (res.status !== 'ok') throw new Error(res.message || 'Gagal memuat riwayat');

    if (!res.data || res.data.length === 0) {
      box.innerHTML = '<span style="color:var(--muted)">Belum ada riwayat perubahan judul untuk mahasiswa ini.</span>';
      return;
    }

    // Urutkan terbaru dulu
    const sorted = [...res.data].sort((a, b) => (b.timestamp || '').localeCompare(a.timestamp || ''));

    box.innerHTML = `
      <div style="border-top:1px solid var(--border);padding-top:8px">
        <div style="font-weight:600;margin-bottom:6px;color:var(--ink)">📜 Riwayat Perubahan Judul</div>
        ${sorted.map(r => `
          <div style="margin-bottom:8px;padding:8px;background:#f9fafb;border-radius:6px">
            <div style="color:var(--muted);font-size:11px">${r.timestamp} — oleh ${r.diubahOleh}</div>
            <div style="margin-top:4px"><s style="color:#9ca3af">${r.judulLama || '(kosong)'}</s></div>
            <div style="margin-top:2px;color:var(--ink)">→ ${r.judulBaru}</div>
          </div>
        `).join('')}
      </div>
    `;
  } catch (err) {
    box.innerHTML = '<span style="color:var(--accent)">Gagal memuat riwayat: ' + err.message + '</span>';
  }
}

async function hapusDariBimbinganBtn(btn) {
  const nim = btn.dataset.nim;
  const nama = btn.dataset.nama;

  const confirmed = confirm(
    `Yakin "${nama}" (NIM ${nim}) BUKAN mahasiswa bimbingan Anda?\n\n` +
    `Mahasiswa ini akan dihapus dari daftar bimbingan Anda saja. ` +
    `Data mahasiswa tidak akan hilang dari sistem, dan pembimbing lain (jika ada) tidak terpengaruh.`
  );
  if (!confirmed) return;

  btn.disabled = true;
  btn.innerHTML = '⏳ Menghapus...';

  try {
    const res = await callGAS({
      action: 'deleteMahasiswaDariBimbingan',
      token: dosenToken,
      nim: nim
    });
    if (res.status !== 'ok') throw new Error(res.message);

    // Hapus dari daftar lokal & re-render
    mahasiswaList = mahasiswaList.filter(m => String(m.nim) !== String(nim));
    delete formData[nim];
    delete progressData[nim];
    delete historyData[nim];

    showToast('✅ ' + nama.split(' ')[0] + ' dihapus dari daftar bimbingan Anda', 'success');
    renderUI();
  } catch (err) {
    showToast('Gagal: ' + err.message, 'error');
    btn.disabled = false;
    btn.innerHTML = '🗑️ Bukan Mahasiswa Bimbingan Saya — Hapus';
  }
}

// ============================================================
// SAVE SINGLE
// ============================================================
async function saveSingle(nim, namaMahasiswa, prodi, posisi) {
  const fd = formData[nim] || {};

  // Validasi
  if (!fd.tglBimbingan) return showToast('Isi tanggal bimbingan dulu!', 'error');
  if (!fd.topikBimbingan) return showToast('Isi topik bimbingan dulu!', 'error');
  if (!fd.statusProgress) return showToast('Pilih status progress dulu!', 'error');
  if (!fd.kendalaUtama) return showToast('Pilih kendala utama dulu!', 'error');
  if (!fd.kesanggupan) return showToast('Pilih kesanggupan pendadaran dulu!', 'error');

  const btn = document.getElementById('btnSave_' + nim);
  btn.disabled = true;
  btn.classList.add('saving');
  btn.innerHTML = '⏳ Menyimpan...';

  try {
    const payload = {
      action: 'saveProgress',
      token: dosenToken,
      dosenNama: dosenNama,
      nim: nim,
      namaMahasiswa: namaMahasiswa,
      prodi: prodi,
      posisi: posisi,
      periode: periode,
      tglBimbingan: fd.tglBimbingan || periode,
      bimbinganKe: fd.bimbinganKe || '',
      topikBimbingan: fd.topikBimbingan || '',
      statusProgress: fd.statusProgress,
      progressDetail: fd.progressDetail || '',
      kendalaUtama: fd.kendalaUtama,
      kendalaDetail: fd.kendalaDetail || '',
      kesanggupan: fd.kesanggupan,
      catatanDosen: fd.catatanDosen || ''
    };

    // Kalau ada judul baru
    if (fd.judulBaru && fd.judulBaru.trim()) {
      await callGAS({
        action: 'updateJudul',
        token: dosenToken,
        nim: nim,
        judul: fd.judulBaru.trim()
      });
    }

    const res = await callGAS(payload);
    if (res.status !== 'ok') throw new Error(res.message);

    // Update state — progressData = terbaru, historyData = append
    const savedEntry = { ...payload, updatedAt: new Date().toLocaleString('id-ID') };
    progressData[nim] = savedEntry;
    if (!historyData[nim]) historyData[nim] = [];
    historyData[nim].push(savedEntry);

    // Update UI card
    const card = document.getElementById('card_' + nim);
    card.classList.add('filled');
    card.querySelector('.mhs-header').style.borderLeftColor = 'var(--green-lt)';

    // Update status pill
    const metaDiv = card.querySelectorAll('.mhs-meta')[1];
    if (metaDiv) {
      const keLabel = fd.bimbinganKe ? ' #' + fd.bimbinganKe : '';
      metaDiv.innerHTML = `
        <span class="status-pill saved">✓ Tersimpan</span>
        <span class="status-pill saved" style="background:#dbeafe;color:#1e40af">${fd.statusProgress}</span>
        <span class="status-pill saved" style="background:#f3e8ff;color:#6b21a8">Bimbingan${keLabel}</span>
      `;
    }

    updateProgressBar();
    showToast('✅ Progress ' + namaMahasiswa.split(' ')[0] + ' tersimpan!', 'success');

    // Tutup card
    setTimeout(() => {
      card.classList.remove('open');
    }, 800);

  } catch(err) {
    showToast('Gagal menyimpan: ' + err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.classList.remove('saving');
    btn.innerHTML = '💾 Simpan Progress';
  }
}

async function saveAll() {
  const unfilledList = mahasiswaList.filter(m => !progressData[String(m.nim)]);
  
  if (unfilledList.length === 0) {
    showToast('Semua mahasiswa sudah tersimpan! 🎉', 'success');
    return;
  }

  // Buka semua card yang belum diisi
  unfilledList.forEach(m => {
    const card = document.getElementById('card_' + m.nim);
    if (card && !card.classList.contains('open')) {
      card.classList.add('open');
    }
  });

  showToast(`${unfilledList.length} mahasiswa belum diisi — lengkapi dulu ya!`, 'error');
  
  // Scroll ke yang pertama belum diisi
  if (unfilledList.length > 0) {
    const firstCard = document.getElementById('card_' + unfilledList[0].nim);
    if (firstCard) firstCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

// ============================================================
// UPDATE PROGRESS BAR
// ============================================================
function updateProgressBar() {
  const total = mahasiswaList.length;
  const filled = mahasiswaList.filter(m => historyData[String(m.nim)] && historyData[String(m.nim)].length > 0).length;
  const pct = total > 0 ? Math.round((filled / total) * 100) : 0;
  const fill = document.getElementById('progressFill');
  const lbl = document.getElementById('pctLabel');
  if (fill) fill.style.width = pct + '%';
  if (lbl) lbl.textContent = pct + '%';

  // Update stat cards
  const statNums = document.querySelectorAll('.stat-item .num');
  if (statNums[1]) statNums[1].textContent = filled;
  if (statNums[2]) statNums[2].textContent = total - filled;
}

// ============================================================
// GAS API CALL
// ============================================================
// Kadang Google Apps Script mengembalikan halaman HTML (redirect/error sementara,
// rate limit, dsb) bukan JSON — ini menyebabkan "Unexpected token '<'" saat di-parse.
// Kejadiannya tidak konsisten (kadang berhasil, kadang gagal), jadi kita retry
// beberapa kali sebelum benar-benar menyerah, dan beri pesan yang jelas kalau gagal.
async function callGAS(payload, attempt = 1) {
  const MAX_ATTEMPTS = 3;
  let res;
  try {
    res = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify(payload)
    });
  } catch (networkErr) {
    // Gagal total (offline, DNS, dsb) — retry kalau masih ada kesempatan
    if (attempt < MAX_ATTEMPTS) {
      await new Promise(r => setTimeout(r, 800 * attempt));
      return callGAS(payload, attempt + 1);
    }
    throw new Error('Tidak bisa terhubung ke server. Periksa koneksi internet Anda.');
  }

  const rawText = await res.text();
  try {
    return JSON.parse(rawText);
  } catch (parseErr) {
    // Respons bukan JSON valid (kemungkinan HTML dari Google: redirect/limit/error sementara)
    if (attempt < MAX_ATTEMPTS) {
      await new Promise(r => setTimeout(r, 800 * attempt));
      return callGAS(payload, attempt + 1);
    }
    console.error('Respons GAS tidak valid setelah ' + MAX_ATTEMPTS + 'x percobaan:', rawText.slice(0, 200));
    throw new Error('Server sedang sibuk atau tidak merespons dengan benar. Coba lagi dalam beberapa saat.');
  }
}

async function simpanMahasiswaBaru() {
  const nama  = document.getElementById('newNama').value.trim();
  const nim   = document.getElementById('newNim').value.trim();
  const prodi = document.getElementById('newProdi').value;
  const posisi = document.getElementById('newPosisi').value;
  const judul = document.getElementById('newJudul').value.trim();

  if (!nama)  return showToast('Nama mahasiswa wajib diisi!', 'error');
  if (!nim)   return showToast('NIM wajib diisi!', 'error');
  if (!prodi) return showToast('Pilih program studi dulu!', 'error');
  if (!posisi) return showToast('Pilih posisi pembimbing dulu!', 'error');

  // Cek duplikat NIM lokal
  if (mahasiswaList.find(m => String(m.nim) === String(nim))) {
    return showToast('NIM ' + nim + ' sudah ada di daftar!', 'error');
  }

  const btn = document.getElementById('btnSimpanBaru');
  btn.disabled = true;
  btn.innerHTML = '⏳ Menyimpan...';

  try {
    const res = await callGAS({
      action: 'addMahasiswa',
      token: dosenToken,
      dosenNama: dosenNama,
      nim: nim,
      nama: nama,
      prodi: prodi,
      posisi: posisi,
      judul: judul || ''
    });

    if (res.status !== 'ok') throw new Error(res.message);

    // Tambah ke list lokal
    const newMhs = { nim, nama, prodi, judul, posisi, kategori: '' };
    mahasiswaList.push(newMhs);
    formData[nim] = {
      tglBimbingan: getTodayLocal(),
      bimbinganKe: '', topikBimbingan: '',
      statusProgress: '', progressDetail: '',
      kendalaUtama: '', kendalaDetail: '',
      kesanggupan: '', catatanDosen: '', judulBaru: ''
    };

    closeModal();
    showToast('✅ ' + nama.split(' ')[0] + ' berhasil ditambahkan!', 'success');

    // Re-render UI
    renderUI();

  } catch(err) {
    showToast('Gagal: ' + err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '➕ Tambahkan ke Daftar';
  }
}

    { label: 'Total Mahasiswa', val: mahasiswaList.length },
    { label: 'Sudah Dilaporkan', val: filled.length },
    { label: 'Siap Maju Juli', val: Object.values(progressData).filter(p => p.kesanggupan === 'Siap Juli').length },
    { label: 'Total Sesi', val: Object.keys(progressData).length },
  ];
  const cardW = 43, cardH = 18, cardY = 60;
  cardData.forEach((c, i) => {
    const x = 14 + i * (cardW + 2);
    doc.setFillColor(240, 242, 245);
    doc.roundedRect(x, cardY, cardW, cardH, 2, 2, 'F');
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(16);
    doc.setTextColor(26, 26, 46);
    doc.text(String(c.val), x + cardW/2, cardY + 10, { align: 'center' });
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(7.5);
    doc.setTextColor(107, 114, 128);
    doc.text(c.label, x + cardW/2, cardY + 15, { align: 'center' });
  });

  // ── TABEL PROGRESS TERBARU PER MAHASISWA ──
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(11);
  doc.setTextColor(26, 26, 46);
  doc.text('Status Progress Mahasiswa', 14, 88);

  // Pisah PB1 dan PB2
  const pb1 = mahasiswaList.filter(m => m.posisi === 'Pembimbing 1');
  const pb2 = mahasiswaList.filter(m => m.posisi === 'Pembimbing 2');
  const allSorted = [...pb1, ...pb2];

  const tableRows = allSorted.map((m, i) => {
    const nim = String(m.nim);
    const p = progressData[nim];
    return [
      i + 1,
      m.nama,
      m.nim,
      m.posisi === 'Pembimbing 1' ? 'PB1' : 'PB2',
      p ? (p.tglBimbingan || p.periode || '—') : '—',
      p ? 'Ke-' + (p.bimbinganKe || '?') : '—',
      p ? (p.topikBimbingan || '—') : '—',
      p ? (p.statusProgress || '—') : 'Belum diisi',
      p ? (p.kesanggupan || '—') : '—',
      p ? (p.catatanDosen || '—') : '—',
    ];
  });

  doc.autoTable({
    startY: 91,
    head: [['No','Nama','NIM','Pos','Tgl','Sesi','Topik','Status Progress','Kesanggupan','Catatan']],
    body: tableRows,
    styles: { fontSize: 7.5, cellPadding: 2.5, overflow: 'linebreak' },
    headStyles: { fillColor: [26, 26, 46], textColor: 255, fontStyle: 'bold', fontSize: 7.5 },
    columnStyles: {
      0: { cellWidth: 7 },
      1: { cellWidth: 38 },
      2: { cellWidth: 16 },
      3: { cellWidth: 9 },
      4: { cellWidth: 17 },
      5: { cellWidth: 10 },
      6: { cellWidth: 28 },
      7: { cellWidth: 30 },
      8: { cellWidth: 22 },
      9: { cellWidth: 18 },
    },
    alternateRowStyles: { fillColor: [248, 249, 250] },
    didParseCell: function(data) {
      if (data.section === 'body') {
        if (data.column.index === 8) {
          const val = data.cell.raw;
          if (val === 'Siap Juli') data.cell.styles.textColor = [45, 106, 79];
          else if (val === 'Siap Agustus') data.cell.styles.textColor = [146, 64, 14];
          else if (val === 'Belum diisi') data.cell.styles.textColor = [233, 69, 96];
        }
        if (data.column.index === 7 && data.cell.raw === 'Belum diisi') {
          data.cell.styles.textColor = [233, 69, 96];
        }
      }
    }
  });

  // ── TANDA TANGAN ──
  const finalY = doc.lastAutoTable.finalY + 14;
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(10);
  doc.setTextColor(26, 26, 46);
  doc.text('Magelang, ' + tglCetak, 140, finalY);
  doc.text('Dosen Pembimbing,', 140, finalY + 7);
  doc.line(140, finalY + 28, 196, finalY + 28);
  doc.setFont('helvetica', 'bold');
  doc.text(namaShort, 140, finalY + 33);

  // ── FOOTER ──
  const pageCount = doc.internal.getNumberOfPages();
  for (let i = 1; i <= pageCount; i++) {
    doc.setPage(i);
    doc.setFontSize(7.5);
    doc.setTextColor(180);
    doc.text('TRACKA — Sistem Tracking Aktivitas Akademik TA/Skripsi | BIPA', 14, 290);
    doc.text('Hal ' + i + '/' + pageCount, 196, 290, { align: 'right' });
  }

  const filename = 'TRACKA_Laporan_' + namaShort.replace(/\s+/g,'_') + '_' +
    now.toISOString().split('T')[0] + '.pdf';
  doc.save(filename);
  showToast('✅ PDF berhasil diunduh!', 'success');
}

</script>

    <div class="modal-subtitle" id="modalDosenLabel">Mahasiswa bimbingan akan ditambahkan ke daftar kamu</div>

    <div class="modal-field">

      <input type="text" id="newNama" placeholder="Contoh: Budi Santoso" />
    </div>

    <div class="modal-field">
      <div class="field-label">NIM <span class="req">*</span></div>

    </div>

    <div class="modal-field">
      <div class="field-label">Program Studi <span class="req">*</span></div>
      <select id="newProdi">
        <option value="">— Pilih Prodi —</option>
        <option value="D3 Manajemen Informatika">D3 Manajemen Informatika</option>
        <option value="S1 Teknik Informatika">S1 Teknik Informatika</option>
      </select>
    </div>

    <div class="modal-field">
      <div class="field-label">Posisi Kamu sebagai <span class="req">*</span></div>
      <select id="newPosisi">
        <option value="">— Pilih posisi —</option>
        <option value="Pembimbing 1">Pembimbing 1</option>
        <option value="Pembimbing 2">Pembimbing 2</option>
      </select>
    </div>

    <div class="modal-field">
      <div class="field-label">Judul TA/Skripsi <span style="color:var(--muted);font-weight:400">(opsional, bisa diisi nanti)</span></div>
      <textarea id="newJudul" placeholder="Judul lengkap TA/Skripsi..." rows="2"></textarea>

    <button class="btn-submit" id="btnSimpanBaru" onclick="simpanMahasiswaBaru()">

    <button class="btn-modal-cancel" onclick="closeModal()">Batal</button>
  </div>
</div>
